name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Linux x64
        run: bun build --compile --target=bun-linux-x64 src/main.ts --outfile dist/acp-agent-linux-x64

      - name: Build macOS arm64
        run: bun build --compile --target=bun-darwin-arm64 src/main.ts --outfile dist/acp-agent-macos-arm64

      - name: Build macOS x64
        run: bun build --compile --target=bun-darwin-x64 src/main.ts --outfile dist/acp-agent-macos-x64

      - name: Build Windows x64
        run: bun build --compile --target=bun-windows-x64 src/main.ts --outfile dist/acp-agent-windows-x64.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "ACP Agent ${{ github.ref_name }}"
          body: |
            ## ACP Agent ${{ github.ref_name }}

            Descarga el binario para tu sistema operativo y ejecútalo directamente.
            No requiere instalar dependencias ni conocimientos técnicos.

            ### Requisitos previos
            - [Ollama](https://ollama.com) **o** [LM Studio](https://lmstudio.ai) instalado y en ejecución.

            ### Instalación
            1. Descarga el binario para tu sistema
            2. Dale permisos de ejecución (Linux/macOS): `chmod +x acp-agent-*`
            3. Ejecútalo — el navegador se abrirá automáticamente
          files: |
            dist/acp-agent-linux-x64
            dist/acp-agent-macos-arm64
            dist/acp-agent-macos-x64
            dist/acp-agent-windows-x64.exe
          draft: false
          prerelease: false
